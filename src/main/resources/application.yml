spring:
    application:
        name: lab6

    datasource:
        url: jdbc:h2:mem:productDB
        driver-class-name: org.h2.Driver
        username: admin
        password: admin

    h2:
        console:
            enabled: true
            path: /h2-console

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

logging:
    level:
        org.hibernate.SQL: DEBUG
        org.hibernate.orm.jdbc.bind: TRACE